name: Deploy Backend to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest 

    steps:
    - name: Kodu İndir (Checkout)
      uses: actions/checkout@v4

    - name: .NET Kur
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x'

    # 🔥 KESİN ÇÖZÜM: Robota "SmartAttendance klasörünün İÇİNE GİR ve ne bulursan derle" diyoruz.
    - name: Projeyi Derle (Build)
      working-directory: ./SmartAttendance
      run: dotnet build --configuration Release

    # Yine o klasörün içindeyken paketliyor ve dosyaları bir üst klasöre (publish_output) çıkarıyoruz.
    - name: Projeyi Paketle (Publish)
      working-directory: ./SmartAttendance
      run: dotnet publish -c Release -o ../publish_output

    - name: Azure'a Yükle (Deploy)
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'smartattendance-ffhxgvbsd6h7ancr' 
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish_output