name: Deploy Backend to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest 

    steps:
    - name: Kodu İndir (Checkout)
      uses: actions/checkout@v4

    - name: .NET Kur
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.x' # .NET 8 kullanıyorsan 8.x, 7 ise 7.x yap

    # 🔥 SON DÜZELTME: Sadece klasör adını veriyoruz, .NET içindeki dosyayı kendi bulur!
    - name: Projeyi Derle (Build)
      run: dotnet build SmartAttendance --configuration Release

    - name: Projeyi Paketle (Publish)
      run: dotnet publish SmartAttendance -c Release -o ./publish_output

    - name: Azure'a Yükle (Deploy)
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'smartattendance-ffhxgvbsd6h7ancr' 
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish_output